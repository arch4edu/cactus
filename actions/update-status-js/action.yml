name: "Update status (JS)"
description: "Update build status in the database using pure JavaScript with MySQL2"
author: "arch4edu"

inputs:
  pkgbase:
    description: 'Package base path (e.g., aarch64/libsearpc)'
    required: true
  status:
    description: 'Build status (built, building, failed, stale)'
    required: true
    default: 'failed'
  workflow:
    description: 'Workflow run ID'
    required: true
  detail:
    description: 'Optional detail message for failed builds (e.g., missing dependencies)'
    required: false
  config:
    description: 'CACTUS_CONFIG YAML string (optional, uses CACTUS_CONFIG env by default)'
    required: false

runs:
  using: "node20"
  main: "dist/index.js"
