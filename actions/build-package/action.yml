name: "Build package"
description: "Build package in chroot environment"

inputs:
  pkgbase:
    description: 'Package base path (e.g., x86_64/gtk2)'
    required: true

outputs:
  result:
    description: "Build result (built/failed)"
    value: ${{ steps.build.outputs.result }}
  detail:
    description: "Error details on failure"
    value: ${{ steps.build.outputs.detail }}

runs:
  using: "composite"
  steps:
    - shell: bash -e {0}
      id: build
      run: |
        chown -R makepkg:root repository
        cd repository/${{ inputs.pkgbase }}
        su makepkg -c cactus-build 2>&1 | tee build.log
        if grep -q 'Cactus has successfully built the package.' build.log; then
          echo "result=built" >> $GITHUB_OUTPUT
          echo "detail=" >> $GITHUB_OUTPUT
        else
          echo "result=failed" >> $GITHUB_OUTPUT
          # Extract missing dependencies using Python script (available in PATH)
          DETAIL="$(extract-build-detail)"
          echo "detail=$DETAIL" >> $GITHUB_OUTPUT
        fi
